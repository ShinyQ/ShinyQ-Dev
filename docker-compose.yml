services:
  # ── Reverse Proxy ──────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: minerva-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: unless-stopped
    networks:
      - minerva-network
    depends_on:
      - shinyq
      - caloriq-frontend

  # ── Infrastructure ────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: minerva-postgres
    env_file:
      - .env
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped
    networks:
      - minerva-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shinyq}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: minerva-redis
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    env_file:
      - .env
    volumes:
      - redis-data:/data
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped
    networks:
      - minerva-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Apps ───────────────────────────────────────────
  shinyq:
    build:
      context: ./ShinyQ
      dockerfile: Dockerfile
    container_name: shinyq-app
    ports:
      - "3000:3000"
    env_file:
      - .env
      - ./ShinyQ/.env
    restart: unless-stopped
    networks:
      - minerva-network
    volumes:
      - shinyq-data:/app/.next/cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # CalorIQ Backend
  caloriq-backend:
    build:
      context: ./CalorIQ/backend
      dockerfile: Dockerfile
    container_name: caloriq-backend
    ports:
      - "8001:8000"
    env_file:
      - ./CalorIQ/backend/.env
    restart: unless-stopped
    networks:
      - minerva-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # CalorIQ Frontend
  caloriq-frontend:
    build:
      context: ./CalorIQ/frontend
      dockerfile: Dockerfile
    container_name: caloriq-frontend
    ports:
      - "3001:3001"
    env_file:
      - ./CalorIQ/frontend/.env
    restart: unless-stopped
    networks:
      - minerva-network
    depends_on:
      - caloriq-backend

networks:
  minerva-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  shinyq-data:
  caloriq-data:
