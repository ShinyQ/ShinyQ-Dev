server {
    listen 80;
    server_name kurniadi.dev www.kurniadi.dev localhost _;

    # Redirect HTTP to HTTPS (only for real domains)
    if ($host ~* "^(kurniadi\.dev|www\.kurniadi\.dev)$") {
        return 301 https://$server_name$request_uri;
    }

    location / {
        proxy_pass http://shinyq:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl http2;
    server_name kurniadi.dev www.kurniadi.dev;

    # SSL Certificates from Let's Encrypt
    ssl_certificate /etc/letsencrypt/live/kurniadi.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kurniadi.dev/privkey.pem;

    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://shinyq:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
